apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: keycloak-external-tls
  namespace: envoy-keycloak-poc
spec:
  targetRefs:
    - group: gateway.envoyproxy.io
      kind: Backend
      name: keycloak-external
  validation:
    caCertificateRefs:
      - name: CLUSTER_DOMAIN-ca
        group: ""
        kind: ConfigMap
    hostname: keycloak.CLUSTER_DOMAIN
