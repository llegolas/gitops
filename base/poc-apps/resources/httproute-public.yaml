apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: poc-public-routes
  namespace: envoy-keycloak-poc
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: envoy-gateway-system
      name: GATEWAY_NAME
      sectionName: https-terminated
  hostnames:
    - poc.CLUSTER_DOMAIN
  rules:
    - matches:
        - path:
            type: Exact
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: public-service
          port: 8080
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - group: ""
          kind: Service
          name: public-service
          port: 8080
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /docs
      backendRefs:
        - group: ""
          kind: Service
          name: public-service
          port: 8080
          weight: 1
