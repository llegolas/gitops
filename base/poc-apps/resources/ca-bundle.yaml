apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: CLUSTER_DOMAIN-ca
spec:
  sources:
    - secret:
        name: CLUSTER_DOMAIN-ca
        key: ca.crt
  target:
    configMap:
      key: ca.crt
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: envoy-keycloak-poc
