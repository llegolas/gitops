apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - ../../../base/argocd
  - httproute.yaml
  - grpcroute.yaml
  - appproject.yaml
patches:
  - target:
      kind: ConfigMap
      name: argocd-cm
      namespace: argocd
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cm
        namespace: argocd
      data:
        exec.enabled: "true"
        kustomize.buildOptions: "--enable-helm --load-restrictor LoadRestrictionsNone"
        application.resourceTrackingMethod: annotation+label
        application.instanceLabelKey: argocd.argoproj.io/instance
  - target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
      namespace: argocd
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm
        namespace: argocd
      data:
        server.insecure: "true"
        applicationsetcontroller.enable.new.git.file.globbing: "true"
  - target:
      kind: Deployment
      name: argocd-server
      namespace: argocd
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-server
        namespace: argocd
      spec:
        template:
          spec:
            containers:
              - name: argocd-server
                args:
                  - /usr/local/bin/argocd-server
                  - --insecure
