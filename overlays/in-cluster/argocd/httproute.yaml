apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: envoy-gateway-system
      name: minikube-envoy
      sectionName: https-terminated
  hostnames:
    - argocd.minikube.home
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
