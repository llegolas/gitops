apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: minikube-envoy
  namespace: envoy-gateway-system
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
spec:
  gatewayClassName: minikube-class
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https-terminated
      hostname: "*.minikube.home"
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-minikube-home
      allowedRoutes:
        namespaces:
          from: All
