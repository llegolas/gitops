apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: minikube-home-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: minikube.home
  secretName: minikube-home-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
