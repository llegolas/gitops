apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../../base/cert-manager/ca/resources
patches:
  - target:
      kind: Certificate
      name: CLUSTER_DOMAIN-ca
    patch: |-
      - op: replace
        path: /metadata/name
        value: minikube-home-ca
      - op: replace
        path: /spec/commonName
        value: minikube.home
      - op: replace
        path: /spec/secretName
        value: minikube-home-ca
  - target:
      kind: ClusterIssuer
      name: ca-issuer
    patch: |-
      - op: replace
        path: /spec/ca/secretName
        value: minikube-home-ca
